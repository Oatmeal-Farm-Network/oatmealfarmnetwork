steps:
  # Build Docker image with VITE_API_URL
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/animated-flare-421518/cloud-run-source-deploy/oatmealfarmnetwork-git'
      - '--build-arg'
      - 'VITE_API_URL=https://oatmealfarmnewtorkbackend-802455386518.us-central1.run.app'
      - '.'


  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/animated-flare-421518/cloud-run-source-deploy/oatmealfarmnetwork-git'

  # Deploy step removed — deploy manually via Cloud Run console or gcloud CLI

images:
  - 'us-central1-docker.pkg.dev/animated-flare-421518/cloud-run-source-deploy/oatmealfarmnetwork-git'