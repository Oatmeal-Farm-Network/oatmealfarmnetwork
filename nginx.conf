# Redirect www.* → non-www (handles all custom domains mapped to this service)
server {
    listen 8080;
    server_name ~^www\.(?<domain>.+)$;
    return 301 https://$domain$request_uri;
}

server {
    listen 8080 default_server;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/wasm;

    # Service worker — must never be cached so browsers detect updates
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web app manifest — no-cache so installs always get the latest
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets aggressively (hashed filenames — safe to cache forever)
    location ~* \.(js|css|webp|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — never cache so new deploys take effect immediately
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # Replace the static homepage canonical with the actual request URI so
        # Googlebot sees the correct canonical in raw HTML before JS executes.
        # PageMeta (React) will overwrite it with the same value after hydration.
        sub_filter '<link rel="canonical" href="https://oatmealfarmnetwork.com"' '<link rel="canonical" href="https://oatmealfarmnetwork.com$uri"';
        sub_filter_once on;
    }
}