<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f6b"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="600" cy="120" r="80" fill="url(#sun)" opacity="0.6"/>
  <circle cx="600" cy="120" r="40" fill="#fbbf24" opacity="0.8"/>
  <!-- Cloud shapes -->
  <g fill="#ffffff" opacity="0.25">
    <ellipse cx="250" cy="140" rx="100" ry="50"/>
    <ellipse cx="310" cy="120" rx="80" ry="45"/>
    <ellipse cx="200" cy="130" rx="70" ry="40"/>
  </g>
  <g fill="#ffffff" opacity="0.15">
    <ellipse cx="500" cy="200" rx="120" ry="55"/>
    <ellipse cx="570" cy="180" rx="90" ry="50"/>
    <ellipse cx="440" cy="190" rx="80" ry="45"/>
  </g>
  <!-- Rain drops -->
  <g fill="#67e8f9" opacity="0.5">
    <ellipse cx="180" cy="220" rx="3" ry="8"/>
    <ellipse cx="220" cy="240" rx="3" ry="8"/>
    <ellipse cx="260" cy="225" rx="3" ry="8"/>
    <ellipse cx="300" cy="250" rx="3" ry="8"/>
    <ellipse cx="200" cy="260" rx="3" ry="8"/>
    <ellipse cx="240" cy="270" rx="3" ry="8"/>
    <ellipse cx="280" cy="255" rx="3" ry="8"/>
  </g>
  <!-- Rolling hills -->
  <path d="M0,340 Q200,280 400,320 Q600,360 800,300 L800,400 L0,400 Z" fill="#065f46" opacity="0.3"/>
  <path d="M0,360 Q200,320 400,350 Q600,380 800,340 L800,400 L0,400 Z" fill="#065f46" opacity="0.2"/>
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14" letter-spacing="3">WEATHER &amp; CLIMATE</text>
</svg>
