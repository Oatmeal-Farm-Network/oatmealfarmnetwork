<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff10" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Chart line -->
  <polyline points="40,320 120,280 200,300 280,220 360,180 440,200 520,140 600,160 680,100 760,60"
    fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow under chart -->
  <polygon points="40,320 120,280 200,300 280,220 360,180 440,200 520,140 600,160 680,100 760,60 760,400 40,400"
    fill="#60a5fa" opacity="0.1"/>
  <!-- Bar chart elements -->
  <rect x="100" y="260" width="40" height="100" rx="4" fill="#60a5fa" opacity="0.4"/>
  <rect x="220" y="220" width="40" height="140" rx="4" fill="#60a5fa" opacity="0.4"/>
  <rect x="340" y="180" width="40" height="180" rx="4" fill="#60a5fa" opacity="0.4"/>
  <rect x="460" y="240" width="40" height="120" rx="4" fill="#60a5fa" opacity="0.4"/>
  <rect x="580" y="160" width="40" height="200" rx="4" fill="#60a5fa" opacity="0.4"/>
  <text x="400" y="380" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14" letter-spacing="3">MARKETS &amp; COMMODITIES</text>
</svg>
