<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1764"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Capitol dome silhouette -->
  <g fill="#ffffff" opacity="0.12">
    <!-- Base -->
    <rect x="250" y="260" width="300" height="100" rx="4"/>
    <!-- Columns -->
    <rect x="270" y="220" width="20" height="40"/>
    <rect x="310" y="220" width="20" height="40"/>
    <rect x="350" y="220" width="20" height="40"/>
    <rect x="430" y="220" width="20" height="40"/>
    <rect x="470" y="220" width="20" height="40"/>
    <rect x="510" y="220" width="20" height="40"/>
    <!-- Pediment -->
    <polygon points="260,220 400,170 540,220"/>
    <!-- Dome -->
    <ellipse cx="400" cy="170" rx="70" ry="50"/>
    <rect x="390" y="110" width="20" height="30"/>
  </g>
  <!-- Document lines -->
  <g fill="#ffffff" opacity="0.1">
    <rect x="100" y="100" width="160" height="8" rx="4"/>
    <rect x="100" y="120" width="120" height="8" rx="4"/>
    <rect x="100" y="140" width="140" height="8" rx="4"/>
    <rect x="580" y="100" width="140" height="8" rx="4"/>
    <rect x="580" y="120" width="100" height="8" rx="4"/>
    <rect x="580" y="140" width="120" height="8" rx="4"/>
  </g>
  <!-- Seal circle -->
  <circle cx="400" cy="300" r="35" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="300" r="28" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14" letter-spacing="3">POLICY &amp; LEGISLATION</text>
</svg>
