<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Rolling pasture -->
  <path d="M0,300 Q150,260 300,290 Q450,320 600,280 Q750,240 800,270 L800,400 L0,400 Z" fill="#065f46" opacity="0.2"/>
  <path d="M0,330 Q200,300 400,330 Q600,360 800,320 L800,400 L0,400 Z" fill="#065f46" opacity="0.15"/>
  <!-- Fence -->
  <g stroke="#fbbf24" stroke-width="1.5" opacity="0.2">
    <line x1="50" y1="280" x2="750" y2="280"/>
    <line x1="50" y1="295" x2="750" y2="295"/>
    <line x1="100" y1="265" x2="100" y2="300"/>
    <line x1="200" y1="265" x2="200" y2="300"/>
    <line x1="300" y1="265" x2="300" y2="300"/>
    <line x1="400" y1="265" x2="400" y2="300"/>
    <line x1="500" y1="265" x2="500" y2="300"/>
    <line x1="600" y1="265" x2="600" y2="300"/>
    <line x1="700" y1="265" x2="700" y2="300"/>
  </g>
  <!-- Simple cow silhouettes -->
  <g fill="#ffffff" opacity="0.15">
    <!-- Cow 1 -->
    <ellipse cx="250" cy="230" rx="45" ry="25"/>
    <circle cx="280" cy="215" r="15"/>
    <rect x="230" y="250" width="8" height="20" rx="2"/>
    <rect x="260" y="250" width="8" height="20" rx="2"/>
    <!-- Cow 2 -->
    <ellipse cx="500" cy="240" rx="40" ry="22"/>
    <circle cx="470" cy="225" r="13"/>
    <rect x="480" y="258" width="7" height="18" rx="2"/>
    <rect x="505" y="258" width="7" height="18" rx="2"/>
    <!-- Cow 3 (smaller, farther) -->
    <ellipse cx="650" cy="245" rx="30" ry="16"/>
    <circle cx="670" cy="234" r="10"/>
    <rect x="638" y="258" width="6" height="14" rx="2"/>
    <rect x="656" y="258" width="6" height="14" rx="2"/>
  </g>
  <!-- Barn silhouette -->
  <g fill="#ffffff" opacity="0.1">
    <rect x="80" y="180" width="100" height="80"/>
    <polygon points="80,180 130,130 180,180"/>
    <rect x="115" y="220" width="30" height="40"/>
  </g>
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14" letter-spacing="3">LIVESTOCK</text>
</svg>
