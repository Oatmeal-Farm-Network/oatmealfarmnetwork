# .github/workflows/test.yml — Task 6 CI pipeline
name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis/redis-stack-server:latest   # includes RediSearch for checkpointing
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://localhost:6379/1"
      TEST_REDIS_URL: "redis://localhost:6379/1"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_MAX_REQUESTS: "20"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      # Disable external services that aren't available in CI
      GOOGLE_CLOUD_PROJECT: ""
      GOOGLE_APPLICATION_CREDENTIALS: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis
        run: |
          for i in $(seq 1 15); do
            redis-cli -h localhost -p 6379 ping && break
            echo "Waiting for Redis ($i/15)..."
            sleep 2
          done

      - name: Run unit tests (message buffer)
        run: pytest tests/test_message_buffer.py -v --tb=short

      - name: Run integration tests (API)
        run: pytest tests/test_integration.py -v --tb=short

      - name: Run all tests with summary
        run: pytest tests/ -v --tb=short -q

